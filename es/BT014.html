<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jabonera</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #C1EFF4;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 40px 32px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .room-tag {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: rgba(0,0,0,0.4);
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .word {
    font-size: 52px;
    font-weight: 700;
    color: #111;
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .pron {
    font-size: 16px;
    color: rgba(0,0,0,0.5);
    margin-bottom: 32px;
    font-style: italic;
  }
  .play-btn {
    background: #111;
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px 36px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: transform 0.1s, opacity 0.2s;
    margin-bottom: 32px;
  }
  .play-btn:active { transform: scale(0.97); }
  .play-btn.playing { opacity: 0.6; }
  .divider { 
    height: 1px; 
    background: rgba(0,0,0,0.1); 
    margin-bottom: 24px;
  }
  .others { display: flex; flex-direction: column; gap: 10px; }
  .other {
    display: flex;
    align-items: center;
    gap: 10px;
    text-align: left;
  }
  .other-lang {
    font-size: 10px;
    font-weight: 700;
    color: rgba(0,0,0,0.35);
    text-transform: uppercase;
    width: 28px;
    flex-shrink: 0;
  }
  .other-word {
    font-size: 18px;
    font-weight: 600;
    color: #222;
    flex: 1;
  }
  .other-pron {
    font-size: 12px;
    color: rgba(0,0,0,0.4);
    font-style: italic;
  }
</style>
</head>
<body>
<div class="card">
  <div class="room-tag">욕실</div>
  <div class="word">jabonera</div>
  <div class="pron"></div>
  <button class="play-btn" onclick="playAudio(this)" id="playBtn">
    ▶ Play
  </button>
  <div class="divider"></div>
  <div class="others"><div class="other"><span class="other-lang">KO</span><span class="other-word">비누받침</span><span class="other-pron">bi-nu-bat-chim</span></div><div class="other"><span class="other-lang">EN</span><span class="other-word">soap dish</span><span class="other-pron">/soʊp dɪʃ/</span></div></div>
</div>
<audio id="audio" src="https://raw.githubusercontent.com/yoonji-kwak/wordcards-audio/main/spanish/BT014_es.mp3" preload="auto"></audio>
<script>
  // 자동 재생
  window.addEventListener('load', function() {
    const audio = document.getElementById('audio');
    audio.play().catch(() => {});
  });

  function playAudio(btn) {
    const audio = document.getElementById('audio');
    btn.classList.add('playing');
    btn.textContent = '♪ Playing...';
    audio.currentTime = 0;
    audio.play();
    audio.onended = function() {
      btn.classList.remove('playing');
      btn.innerHTML = '▶ Play';
    };
  }
</script>
</body>
</html>
