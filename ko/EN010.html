<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>현관문</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#FFD8C2;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:rgba(255,255,255,0.6);backdrop-filter:blur(12px);border-radius:20px;padding:40px 32px;max-width:400px;width:100%;text-align:center;height:380px;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .room-tag{font-size:11px;font-weight:600;letter-spacing:.08em;color:rgba(0,0,0,.4);text-transform:uppercase;margin-bottom:12px}
  .word{font-size:52px;font-weight:700;color:#111;line-height:1.1;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
  .pron{font-size:15px;color:rgba(0,0,0,.45);margin-bottom:20px;font-style:italic}
  .play-btn{background:#111;color:#fff;border:none;border-radius:50px;padding:12px 32px;font-size:15px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:transform .1s,opacity .2s;margin-bottom:20px;flex-shrink:0}
  .play-btn:active{transform:scale(.97)}
  .play-btn.playing{opacity:.6}
  .divider{height:1px;background:rgba(0,0,0,.1);margin-bottom:16px;width:100%;flex-shrink:0}
  .others{display:flex;flex-direction:column;gap:8px;width:100%}
  .other{display:flex;align-items:center;gap:10px;text-align:left}
  .other-lang{font-size:10px;font-weight:700;color:rgba(0,0,0,.35);text-transform:uppercase;width:28px;flex-shrink:0}
  .other-word{font-size:17px;font-weight:600;color:#222;flex:1}
  .other-pron{font-size:12px;color:rgba(0,0,0,.4);font-style:italic}
</style>
</head>
<body>
<div class="card">
  <div class="room-tag">현관</div>
  <div class="word">현관문</div>
  <div class="pron">hyeon-gwan-mun</div>
  <button class="play-btn" onclick="playAudio(this)">▶ Play</button>
  <div class="divider"></div>
  <div class="others"><div class="other"><span class="other-lang">EN</span><span class="other-word">front door</span><span class="other-pron">/frʌnt dɔːr/</span></div><div class="other"><span class="other-lang">ES</span><span class="other-word">puerta principal</span><span class="other-pron"></span></div></div>
</div>
<audio id="audio" src="https://raw.githubusercontent.com/yoonji-kwak/wordcards-audio/main/korean/EN010_ko.mp3" preload="auto"></audio>
<script>
  window.addEventListener('load',()=>document.getElementById('audio').play().catch(()=>{}));
  function playAudio(btn){
    const a=document.getElementById('audio');
    btn.classList.add('playing');btn.textContent='♪ Playing...';
    a.currentTime=0;a.play();
    a.onended=()=>{btn.classList.remove('playing');btn.innerHTML='▶ Play'};
  }
</script>
</body>
</html>
